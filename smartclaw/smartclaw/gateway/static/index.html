<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartClaw Debug UI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; font-size: 16px; overflow: hidden; }
  header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 17px; font-weight: 600; color: #fff; white-space: nowrap; }
  #status-dot { width: 9px; height: 9px; border-radius: 50%; background: #555; flex-shrink: 0; }
  #status-dot.ok { background: #22c55e; }
  #status-text { font-size: 13px; color: #888; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 12px; padding: 3px 8px; border-radius: 10px; background: #2a2a2a; color: #aaa; white-space: nowrap; }
  #model-badge { color: #60a5fa; }
  .main { display: flex; flex: 1; min-height: 0; }
  .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid #2a2a2a; }
  .panel-hdr { padding: 8px 12px; font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #1e1e1e; background: #141414; display: flex; align-items: center; gap: 8px; }
  .panel-hdr .right { margin-left: auto; font-size: 12px; color: #555; font-weight: 400; text-transform: none; letter-spacing: 0; cursor: pointer; }
  .panel-hdr .right:hover { color: #888; }
  #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; font-size: 15px; line-height: 1.5; word-break: break-word; }
  .msg.user { background: #1d4ed8; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.assistant { background: #1e1e1e; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #2a2a2a; }
  .msg.assistant .md-content { white-space: normal; }
  .msg.assistant .md-content h1,.msg.assistant .md-content h2,.msg.assistant .md-content h3 { margin: 8px 0 4px; color: #fff; }
  .msg.assistant .md-content h1 { font-size: 1.2em; } .msg.assistant .md-content h2 { font-size: 1.1em; } .msg.assistant .md-content h3 { font-size: 1em; }
  .msg.assistant .md-content p { margin: 4px 0; }
  .msg.assistant .md-content ul,.msg.assistant .md-content ol { margin: 4px 0 4px 20px; }
  .msg.assistant .md-content code { background: #2a2a2a; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
  .msg.assistant .md-content pre { background: #141414; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
  .msg.assistant .md-content pre code { background: none; padding: 0; }
  .msg.assistant .md-content table { border-collapse: collapse; margin: 6px 0; width: 100%; }
  .msg.assistant .md-content th,.msg.assistant .md-content td { border: 1px solid #333; padding: 4px 8px; font-size: 0.9em; }
  .msg.assistant .md-content th { background: #1a1a1a; color: #aaa; }
  .msg.assistant .md-content strong { color: #fff; }
  .msg.assistant .md-content a { color: #60a5fa; }
  .msg.assistant.streaming { border-color: #3b82f6; }
  .msg.tool-call { background: #1a2a1a; border: 1px solid #2d4a2d; color: #86efac; font-size: 13px; font-family: monospace; align-self: flex-start; max-width: 90%; }
  .msg.tool-result { background: #1a1a2a; border: 1px solid #2d2d4a; color: #93c5fd; font-size: 13px; font-family: monospace; align-self: flex-start; max-width: 90%; }
  .msg.error { background: #2a1a1a; border: 1px solid #4a2d2d; color: #fca5a5; align-self: flex-start; }
  .msg-label { font-size: 11px; color: #555; margin-bottom: 3px; }
  .msg-meta { font-size: 11px; color: #444; margin-top: 4px; }
  .cursor { display: inline-block; width: 2px; height: 14px; background: #60a5fa; animation: blink 1s infinite; vertical-align: middle; margin-left: 2px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .input-area { padding: 10px 12px; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; background: #141414; }
  #msg-input { flex: 1; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 10px 12px; color: #e0e0e0; font-size: 15px; resize: none; height: 44px; max-height: 120px; outline: none; }
  #msg-input:focus { border-color: #3b82f6; }
  #msg-input:disabled { opacity: 0.5; }
  .btn { border: none; border-radius: 8px; padding: 0 16px; height: 44px; font-size: 14px; cursor: pointer; }
  #send-btn { background: #2563eb; color: #fff; }
  #send-btn:hover:not(:disabled) { background: #1d4ed8; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #clear-btn { background: #2a2a2a; color: #888; }
  #clear-btn:hover { background: #333; color: #ccc; }
  .debug-panel { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; }
  .tabs { display: flex; border-bottom: 1px solid #2a2a2a; background: #141414; }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: #666; border-bottom: 2px solid transparent; }
  .tab:hover { color: #aaa; }
  .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }
  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 8px; gap: 6px; }
  .tab-content.active { display: flex; flex-direction: column; }
  .hook-event { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 8px 10px; font-size: 12px; font-family: monospace; margin-bottom: 4px; }
  .hook-event .hp { font-weight: 600; margin-bottom: 3px; }
  .hook-event.tool-before .hp { color: #fbbf24; }
  .hook-event.tool-after .hp { color: #34d399; }
  .hook-event.agent-start .hp { color: #60a5fa; }
  .hook-event.agent-end .hp { color: #a78bfa; }
  .hook-event.llm-before .hp { color: #f472b6; }
  .hook-event.llm-after .hp { color: #fb923c; }
  .hook-event .hd { color: #666; white-space: pre-wrap; word-break: break-all; max-height: 70px; overflow: hidden; }
  .hook-event .hd.exp { max-height: none; }
  .hook-event .ht { color: #444; font-size: 11px; float: right; }
  .tool-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 8px 10px; margin-bottom: 4px; }
  .tool-name { font-size: 13px; font-weight: 600; color: #60a5fa; font-family: monospace; }
  .tool-desc { font-size: 12px; color: #666; margin-top: 2px; }
  .history-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 8px 10px; font-size: 12px; margin-bottom: 4px; }
  .history-role { font-weight: 600; color: #888; margin-bottom: 2px; }
  .history-role.human { color: #60a5fa; }
  .history-role.ai { color: #34d399; }
  .history-content { color: #aaa; white-space: pre-wrap; word-break: break-all; max-height: 60px; overflow: hidden; }
  .empty-msg { color: #444; font-size: 13px; text-align: center; padding: 24px; }
  .small-btn { background: #1e1e1e; border: 1px solid #333; color: #666; border-radius: 4px; padding: 3px 8px; font-size: 12px; cursor: pointer; }
  .small-btn:hover { background: #2a2a2a; color: #ccc; }
  #summary-text { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px; font-size: 13px; color: #aaa; min-height: 80px; white-space: pre-wrap; margin: 8px; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <div id="status-dot"></div>
  <h1>🦀 SmartClaw</h1>
  <span id="status-text">connecting...</span>
  <div class="header-right">
    <span class="badge" id="model-badge">—</span>
    <span class="badge" id="tools-count-badge">0 tools</span>
    <span class="badge" id="session-badge" style="cursor:pointer" onclick="copySession()">no session</span>
  </div>
</header>
<div class="main">
  <div class="chat-panel">
    <div class="panel-hdr">💬 Chat <span class="right" id="session-display" onclick="copySession()">—</span></div>
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="msg-input" placeholder="输入消息... (Enter 发送)" rows="1"></textarea>
      <button class="btn" id="clear-btn" onclick="clearChat()">清空</button>
      <button class="btn" id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>
  <div class="debug-panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('hooks')">🪝 Hooks</div>
      <div class="tab" onclick="switchTab('tools')">🔧 Tools</div>
      <div class="tab" onclick="switchTab('history')">📜 History</div>
      <div class="tab" onclick="switchTab('summary')">📝 Summary</div>
    </div>
    <div class="tab-content active" id="tab-hooks"><div class="empty-msg" id="hooks-empty">等待 hook 事件...</div></div>
    <div class="tab-content" id="tab-tools"></div>
    <div class="tab-content" id="tab-history"><div class="empty-msg">暂无历史</div></div>
    <div class="tab-content" id="tab-summary"><div id="summary-text" style="color:#444">暂无摘要</div></div>
  </div>
</div>
<script>
const API = '';
let sessionKey = null;
let isStreaming = false;
let hookES = null;
let streamEl = null;

async function init() {
  await checkHealth();
  await loadTools();
  connectHooks();
}

async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    document.getElementById('status-dot').className = 'ok';
    document.getElementById('status-text').textContent = 'ready · v' + d.version;
    document.getElementById('tools-count-badge').textContent = d.tools_count + ' tools';
    document.getElementById('model-badge').textContent = d.model || 'kimi/kimi-k2.5';
  } catch(e) {
    document.getElementById('status-dot').className = '';
    document.getElementById('status-text').textContent = 'offline';
  }
}

async function loadTools() {
  try {
    const r = await fetch(API + '/api/tools');
    const tools = await r.json();
    const c = document.getElementById('tab-tools');
    c.innerHTML = '';
    tools.forEach(t => {
      c.innerHTML += '<div class="tool-item"><div class="tool-name">' + esc(t.name) + '</div><div class="tool-desc">' + esc(t.description||'') + '</div></div>';
    });
    if (!tools.length) c.innerHTML = '<div class="empty-msg">无工具</div>';
  } catch(e) {}
}

function connectHooks() {
  if (hookES) hookES.close();
  hookES = new EventSource(API + '/api/debug/hook-events');
  hookES.onmessage = function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.ping) return; // skip heartbeat
      if (!d.hook_point) return;
      addHook(d);
    } catch(err) {}
  };
  hookES.onerror = function() { setTimeout(connectHooks, 3000); };
}

function addHook(d) {
  const c = document.getElementById('tab-hooks');
  const empty = document.getElementById('hooks-empty');
  if (empty) empty.remove();
  const hp = d.hook_point || '';
  const cls = hp.replace(':', '-');
  const t = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const s = JSON.stringify(d, null, 2);
  const el = document.createElement('div');
  el.className = 'hook-event ' + cls;
  el.innerHTML = '<div class="hp">' + esc(hp) + '<span class="ht">' + t + '</span></div><div class="hd">' + esc(s) + '</div>';
  el.querySelector('.hd').onclick = function() { this.classList.toggle('exp'); };
  c.insertBefore(el, c.firstChild);
  while (c.children.length > 80) c.removeChild(c.lastChild);
}

// ── Chat (use sync /api/chat instead of SSE to avoid parsing issues) ──

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = '';
  input.style.height = '44px';
  setStreaming(true);
  addMsg('user', text);
  streamEl = addMsg('assistant', '⏳ 思考中...', true);

  try {
    const body = { message: text };
    if (sessionKey) body.session_key = sessionKey;

    // Use SSE stream
    const resp = await fetch(API + '/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      finishStream();
      addMsg('error', 'HTTP ' + resp.status + ': ' + (await resp.text()));
      return;
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let curEvent = 'message';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      // Process complete lines
      while (buf.indexOf('\n') !== -1) {
        const idx = buf.indexOf('\n');
        const line = buf.substring(0, idx).trim();
        buf = buf.substring(idx + 1);

        if (line === '') {
          // Empty line = end of event, reset
          curEvent = 'message';
          continue;
        }
        if (line.startsWith('event:')) {
          curEvent = line.substring(6).trim();
          continue;
        }
        if (line.startsWith('data:')) {
          const raw = line.substring(5).trim();
          if (!raw) continue;
          try {
            const data = JSON.parse(raw);
            handleEvent(curEvent, data);
          } catch(e) {}
        }
      }
    }
  } catch(e) {
    addMsg('error', '连接错误: ' + e.message);
  } finally {
    finishStream();
  }
}

function handleEvent(type, data) {
  if (type === 'thinking') {
    updateStream('⏳ 思考中...（第 ' + (data.iteration || 0) + ' 轮）');
  } else if (type === 'tool_call') {
    addMsgBefore(streamEl, 'tool-call', '🔧 ' + (data.tool_name || '?') + (data.tool_call_id ? ' [' + data.tool_call_id + ']' : '') + '\n' + JSON.stringify(data.args || {}, null, 2));
  } else if (type === 'tool_result') {
    addMsgBefore(streamEl, 'tool-result', (data.success ? '✅' : '❌') + ' ' + (data.tool_name || '?') + ' (' + (data.duration_ms || 0).toFixed(0) + 'ms)\n' + (data.result || ''));
  } else if (type === 'iteration') {
    updateStream('🔄 迭代 ' + (data.current || 0) + '/' + (data.max || 0));
  } else if (type === 'done') {
    const response = data.response || data.final_answer || '';
    const sk = data.session_key;
    const iters = data.iterations || 0;
    if (sk) { sessionKey = sk; updateSessionUI(); }
    updateStream(response || '(无响应)', true);
    if (streamEl) {
      streamEl.classList.remove('streaming');
      const cur = streamEl.querySelector('.cursor');
      if (cur) cur.remove();
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = iters + ' iterations';
      streamEl.appendChild(meta);
    }
  } else if (type === 'error') {
    updateStream('❌ ' + (data.error || '未知错误'));
    if (streamEl) { streamEl.classList.add('error'); streamEl.classList.remove('streaming'); }
  } else {
    // Unknown event type — try to extract useful info
    if (data.session_key && !sessionKey) { sessionKey = data.session_key; updateSessionUI(); }
    if (data.response || data.final_answer) {
      updateStream(data.response || data.final_answer);
    }
  }
}

function addMsgBefore(beforeEl, type, text) {
  const c = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  el.innerHTML = '<div class="msg-label">' + (type === 'tool-call' ? 'TOOL CALL' : 'TOOL RESULT') + '</div><pre style="white-space:pre-wrap;word-break:break-all;font-size:10px;margin:0">' + esc(text) + '</pre>';
  if (beforeEl && beforeEl.parentNode === c) {
    c.insertBefore(el, beforeEl);
  } else {
    c.appendChild(el);
  }
  c.scrollTop = c.scrollHeight;
  return el;
}

function addMsg(type, text, streaming) {
  const c = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg ' + type + (streaming ? ' streaming' : '');
  if (type === 'user') {
    el.textContent = text;
  } else if (type === 'tool-call' || type === 'tool-result') {
    el.innerHTML = '<div class="msg-label">' + (type === 'tool-call' ? 'TOOL CALL' : 'TOOL RESULT') + '</div><pre style="white-space:pre-wrap;word-break:break-all;font-size:10px;margin:0">' + esc(text) + '</pre>';
  } else if (type === 'error') {
    el.textContent = text;
  } else {
    const span = document.createElement('span');
    span.className = 'msg-text';
    span.textContent = text;
    el.appendChild(span);
    if (streaming) { const cur = document.createElement('span'); cur.className = 'cursor'; el.appendChild(cur); }
  }
  c.appendChild(el);
  c.scrollTop = c.scrollHeight;
  return el;
}

function updateStream(text, renderMd) {
  if (!streamEl) return;
  const s = streamEl.querySelector('.msg-text');
  if (s) {
    if (renderMd && typeof marked !== 'undefined') {
      s.className = 'md-content';
      s.innerHTML = marked.parse(text);
    } else {
      s.textContent = text;
    }
  }
  document.getElementById('messages').scrollTop = 99999;
}

function finishStream() { setStreaming(false); streamEl = null; }

function setStreaming(v) {
  isStreaming = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('msg-input').disabled = v;
  document.getElementById('send-btn').textContent = v ? '...' : '发送';
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  sessionKey = null;
  updateSessionUI();
}

function updateSessionUI() {
  const d = document.getElementById('session-display');
  const b = document.getElementById('session-badge');
  if (sessionKey) {
    const s = sessionKey.slice(0, 8) + '...';
    d.textContent = 'session: ' + s;
    b.textContent = s;
  } else {
    d.textContent = '—';
    b.textContent = 'no session';
  }
}

function copySession() {
  if (sessionKey) navigator.clipboard.writeText(sessionKey).then(() => {
    const b = document.getElementById('session-badge');
    const o = b.textContent; b.textContent = '✓'; setTimeout(() => b.textContent = o, 1000);
  });
}

async function loadHistory() {
  const c = document.getElementById('tab-history');
  if (!sessionKey) { c.innerHTML = '<div class="empty-msg">先发送消息创建会话</div>'; return; }
  try {
    const r = await fetch(API + '/api/sessions/' + sessionKey + '/history');
    const d = await r.json();
    c.innerHTML = '';
    if (!d.messages || !d.messages.length) { c.innerHTML = '<div class="empty-msg">暂无历史</div>'; return; }
    d.messages.forEach(m => {
      const role = m.type || m.role || '?';
      const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
      c.innerHTML += '<div class="history-item"><div class="history-role ' + role + '">' + role.toUpperCase() + '</div><div class="history-content">' + esc(content) + '</div></div>';
    });
  } catch(e) { c.innerHTML = '<div class="empty-msg" style="color:#f87171">加载失败</div>'; }
}

async function loadSummary() {
  if (!sessionKey) { document.getElementById('summary-text').textContent = '暂无摘要'; return; }
  try {
    const r = await fetch(API + '/api/sessions/' + sessionKey + '/summary');
    const d = await r.json();
    document.getElementById('summary-text').textContent = d.summary || '（暂无摘要）';
  } catch(e) {}
}

function switchTab(name) {
  const names = ['hooks', 'tools', 'history', 'summary'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', names[i] === name));
  names.forEach(n => {
    const el = document.getElementById('tab-' + n);
    if (el) el.classList.toggle('active', n === name);
  });
  if (name === 'history') loadHistory();
  if (name === 'summary') loadSummary();
  if (name === 'tools') loadTools();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = '44px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

init();
</script>
</body>
</html>
